spring.config.import=optional:file:.env[.properties]
spring.application.name=desafio

# Database configuration via environment variables (defaults provided)
# Use localhost as default host so the app can run locally without docker
spring.datasource.url=${DB_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

# Server
server.port=${SERVER_PORT:8080}

# Logging to help debug DB connection issues
logging.level.org.hibernate.orm.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG

mockoon.api.url=${MOCKOON_URL}
